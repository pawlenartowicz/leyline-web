# Example nginx reverse-proxy in front of leyline-web. Place at
# /etc/nginx/conf.d/leyline-web.conf (or include from the main server block).
# Pair with certbot for TLS.
#
# After certbot generates the TLS (443) server block, ensure these three
# directives are present inside it (do NOT add to the :80 block — a bad
# HSTS deploy over plain HTTP locks users out):
#   ssl_protocols TLSv1.2 TLSv1.3;                # block TLS 1.0/1.1 downgrade
#   ssl_prefer_server_ciphers off;                # let modern clients pick
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # certbot will manage 80→443 redirect and the TLS server block.
    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Liveness probe — keep behind the proxy so external load balancers can
    # hit it without going through routing logic.
    location = /_health {
        proxy_pass http://127.0.0.1:8091/_health;
        access_log off;
    }
}
