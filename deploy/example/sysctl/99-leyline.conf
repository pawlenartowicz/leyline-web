# leyline-web uses fsnotify with a tiny watch surface (one recursive watch
# per vault on .leyline/vaultconfig/).
# 2024 is generous for typical deployments. Raise if you run alongside other
# watch-heavy services (e.g. multiple text editors on the same machine, or a
# large-scale file indexer).
fs.inotify.max_user_watches=2024
