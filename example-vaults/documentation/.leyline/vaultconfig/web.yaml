parent_theme: notes          # docs sites are the notes theme in "docs mode" (versions block below)
guest_role: view
auth:
  login_button: none

vault_id: documentation
vault_name: "Documentation"
vault_tagline: "use template documentation"
vault_home: index.md

# Docs mode: opt into the version switcher + a right-rail table of contents.
# The notes theme leaves both off; turning them on here is what distinguishes
# a documentation site. `versions:` is a whole-block override — all four keys
# are spelled out (they are not merged with the theme's defaults). The left
# file-tree (left_sidebar: [navigation]) is inherited from notes.
versions:
  switcher: true
  default: latest_tag
  show_head: true
  mode: only_versioned
right_sidebar: [search_field, table_of_content]

# Full-text search over this vault's trigram index (opt-in). The search_field
# widget in right_sidebar above renders the field; this block builds the index
# and serves /_search. Footprint and query floor keep their defaults.
search:
  enabled: true

header:
  navigation: nav.nav

footer:
  license: "CC BY-SA 4.0"
  copyright: "© 2026 Pawel Lenartowicz"
