<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" role="img" aria-label="Sync flow diagram, light-mode rendering">
  <rect width="640" height="320" rx="14" fill="#fbfbfa"/>
  <text x="32" y="52" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1b1d22">Sync flow</text>
  <text x="32" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">light-mode rendering</text>

  <g font-family="system-ui, sans-serif" font-size="16" fill="#1b1d22" text-anchor="middle">
    <rect x="40"  y="150" width="150" height="64" rx="12" fill="#ffffff" stroke="#3a5bd9" stroke-width="1.5"/>
    <text x="115" y="187">Client</text>

    <rect x="245" y="150" width="150" height="64" rx="12" fill="#ffffff" stroke="#3a5bd9" stroke-width="1.5"/>
    <text x="320" y="187">Server</text>

    <rect x="450" y="150" width="150" height="64" rx="12" fill="#ffffff" stroke="#3a5bd9" stroke-width="1.5"/>
    <text x="525" y="187">Disk + Git</text>
  </g>

  <g stroke="#3a5bd9" stroke-width="2" fill="none" marker-end="url(#arrow-light)">
    <line x1="190" y1="182" x2="240" y2="182"/>
    <line x1="395" y1="182" x2="445" y2="182"/>
  </g>

  <defs>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a5bd9"/>
    </marker>
  </defs>
</svg>
