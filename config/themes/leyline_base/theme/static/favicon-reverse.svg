  <title>Leyline</title>
  <g stroke="#F1ECDF" stroke-width="1.5">
    <line x1="4" y1="8" x2="20" y2="8"/>
    <line x1="4" y1="12" x2="20" y2="12"/>
    <line x1="4" y1="16" x2="20" y2="16"/>
  </g>
  <circle cx="8.5" cy="8" r="1.6" fill="#F1ECDF"/>
  <circle cx="16" cy="16" r="1.6" fill="#F1ECDF"/>
